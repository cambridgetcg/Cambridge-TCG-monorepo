name: Scrape CardRush Prices

on:
  schedule:
    # Every 6 hours at :17 past (avoid :00 stampede)
    - cron: "17 */6 * * *"
  workflow_dispatch: # Allow manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - run: corepack enable && corepack prepare pnpm@10 --activate

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install

      - name: Scrape all sets (prices only)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npx tsx tools/scrape-cardrush.ts --set-all --prices-only
