services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: rewardspro
      POSTGRES_PASSWORD: ${REWARDSPRO_LOCAL_DB_PASSWORD:?Set REWARDSPRO_LOCAL_DB_PASSWORD}
      POSTGRES_USER: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rewardspro"]
      interval: 2s
      timeout: 2s
      retries: 15
    ports:
      - "5433:5432"
    volumes:
      - rewardspro-api-postgres:/var/lib/postgresql/data

volumes:
  rewardspro-api-postgres:
