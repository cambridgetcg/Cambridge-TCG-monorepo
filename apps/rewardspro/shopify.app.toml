# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "f04b5854fb022d67ba9dd097767b465a"
name = "rewardspro-production"
application_url = "https://rewardspro-production-nnwf.vercel.app"
embedded = true
handle = "rewardspro-production"

[build]
include_config_on_deploy = true
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2025-07"

  # HTTPS webhooks (for backward compatibility and local development)
  [[webhooks.subscriptions]]
  topics = ["customers/create"]
  uri = "arn:aws:events:eu-north-1::event-source/aws.partner/shopify.com/275601129473/customers-create"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "/webhooks/app/scopes_update"

  [[webhooks.subscriptions]]
  topics = [ "orders/paid" ]
  uri = "/webhooks/orders/paid"

  [[webhooks.subscriptions]]
  topics = [ "orders/create" ]
  uri = "/webhooks/orders/create"

  [[webhooks.subscriptions]]
  compliance_topics = ["customers/data_request", "customers/redact", "shop/redact"]
  uri = "/webhooks/compliance"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "read_customers,write_customers,read_orders,read_all_orders,write_store_credit_account_transactions,read_store_credit_accounts,write_app_proxy,write_products"

[auth]
redirect_urls = ["https://rewardspro-production-nnwf.vercel.app/auth/callback", "https://rewardspro-production-nnwf.vercel.app/auth/shopify/callback", "https://rewardspro-production-nnwf.vercel.app/api/auth/callback"]

[pos]
embedded = false

# App proxy configuration for customer-facing widget API
# This allows the widget to securely fetch member data through Shopify's HMAC-verified proxy
# Storefront requests to /apps/rewardspro/* are proxied to /api/proxy/*
[app_proxy]
url = "https://rewardspro-production-nnwf.vercel.app/api/proxy"
subpath = "rewardspro"
prefix = "apps"
