<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Page not found — Rewards Pro</title>
    <meta name="robots" content="noindex" />
    <meta name="theme-color" content="#09110f" />
    <style>
      :root {
        color-scheme: dark;
        --ink: #09110f;
        --paper: #f5f0e5;
        --muted: #b3bdb7;
        --line: rgba(245, 240, 229, 0.13);
        --gold: #f3c85b;
        --mint: #83e2b7;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at 15% 15%, rgba(131, 226, 183, 0.12), transparent 27rem),
          radial-gradient(circle at 85% 80%, rgba(243, 200, 91, 0.12), transparent 30rem),
          var(--ink);
        color: var(--paper);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      main {
        width: min(680px, 100%);
        padding: clamp(30px, 7vw, 64px);
        border: 1px solid var(--line);
        border-radius: 26px;
        background: rgba(16, 27, 24, 0.84);
        box-shadow: 0 30px 90px rgba(0, 0, 0, 0.3);
      }

      .mark {
        width: 48px;
        height: 48px;
        display: grid;
        place-items: center;
        margin-bottom: 30px;
        border-radius: 15px;
        background: var(--gold);
        color: var(--ink);
        font-weight: 900;
      }

      p:first-of-type {
        margin: 0 0 10px;
        color: var(--mint);
        font-size: 0.8rem;
        font-weight: 850;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0 0 18px;
        font-size: clamp(2.5rem, 9vw, 5rem);
        line-height: 1;
        letter-spacing: -0.055em;
      }

      .copy {
        max-width: 520px;
        margin: 0 0 30px;
        color: var(--muted);
        font-size: 1.08rem;
        line-height: 1.65;
      }

      a {
        min-height: 46px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0 18px;
        border-radius: 999px;
        background: var(--gold);
        color: var(--ink);
        font-weight: 850;
        text-decoration: none;
      }

      a:hover {
        background: var(--paper);
      }
    </style>
  </head>
  <body>
    <main>
      <div class="mark" aria-hidden="true">RP</div>
      <p>404 · Connection not found</p>
      <h1>This path hasn’t joined the platform.</h1>
      <p class="copy">
        The page may have moved, or the connection you followed does not exist.
        The Rewards Pro homepage has the live product and integration map.
      </p>
      <a href="/">Return to Rewards Pro</a>
    </main>
  </body>
</html>
