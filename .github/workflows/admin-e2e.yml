name: Admin E2E

# Playwright smoke + spec tests for apps/admin.
#
# Runs on every PR that touches apps/admin/**. Tests run against a locally
# built + served admin server with mock DB env vars.
#
# For tests that require real DB data (KPI counts, state transitions), set
# ADMIN_BASE_URL to a Vercel preview URL and provide real DB secrets —
# or run locally with: pnpm --filter @cambridge-tcg/admin test:e2e
#
# Required secrets (optional — tests skip gracefully without them):
#   STOREFRONT_DATABASE_URL — real storefront RDS connection string
#   WHOLESALE_DATABASE_URL  — real wholesale RDS connection string
#
# Required secrets (always):
#   None — CI uses mock env vars for the build; DB-dependent tests are
#   skipped automatically when DB is unreachable.

on:
  pull_request:
    paths:
      - "apps/admin/**"
      - "packages/**"
      - ".github/workflows/admin-e2e.yml"
  workflow_dispatch:
    inputs:
      admin_base_url:
        description: "Admin base URL to test against (default: http://localhost:3002)"
        required: false
        default: "http://localhost:3002"

concurrency:
  group: admin-e2e-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write  # for PR comment on failure

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with: { version: 9 }

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm --filter @cambridge-tcg/admin exec playwright install chromium --with-deps

      - name: Build admin
        run: pnpm --filter @cambridge-tcg/admin build
        env:
          STOREFRONT_DATABASE_URL: ${{ secrets.STOREFRONT_DATABASE_URL || 'postgres://x:x@localhost:5432/x' }}
          WHOLESALE_DATABASE_URL: ${{ secrets.WHOLESALE_DATABASE_URL || 'postgres://x:x@localhost:5432/x' }}
          NEXTAUTH_SECRET: ci-playwright-secret-not-production
          NEXTAUTH_URL: http://localhost:3002
          AUTH_FROM_EMAIL: ci@example.com

      - name: Start admin server
        run: pnpm --filter @cambridge-tcg/admin start &
        env:
          STOREFRONT_DATABASE_URL: ${{ secrets.STOREFRONT_DATABASE_URL || 'postgres://x:x@localhost:5432/x' }}
          WHOLESALE_DATABASE_URL: ${{ secrets.WHOLESALE_DATABASE_URL || 'postgres://x:x@localhost:5432/x' }}
          NEXTAUTH_SECRET: ci-playwright-secret-not-production
          NEXTAUTH_URL: http://localhost:3002
          AUTH_FROM_EMAIL: ci@example.com
          PORT: 3002

      - name: Wait for admin server
        run: npx wait-on http://localhost:3002 --timeout 30000

      - name: Run Playwright smoke spec
        run: pnpm --filter @cambridge-tcg/admin test:e2e --project=chromium smoke.spec.ts
        env:
          ADMIN_BASE_URL: ${{ github.event.inputs.admin_base_url || 'http://localhost:3002' }}
          CI: "true"
        continue-on-error: true
        id: smoke

      - name: Run Playwright template specs
        run: pnpm --filter @cambridge-tcg/admin test:e2e --project=chromium manager.template.spec.ts dashboard.template.spec.ts
        env:
          ADMIN_BASE_URL: ${{ github.event.inputs.admin_base_url || 'http://localhost:3002' }}
          CI: "true"
        continue-on-error: true
        id: specs

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}
          path: playwright-output/admin-html/
          retention-days: 7

      - name: Comment PR with results
        if: github.event_name == 'pull_request' && (steps.smoke.outcome == 'failure' || steps.specs.outcome == 'failure')
        uses: actions/github-script@v7
        with:
          script: |
            const smoke = '${{ steps.smoke.outcome }}';
            const specs = '${{ steps.specs.outcome }}';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              '## ❌ Admin E2E failures',
              '',
              `| Suite | Result |`,
              `|-------|--------|`,
              `| smoke.spec.ts | ${smoke === 'failure' ? '❌ failed' : '✅ passed'} |`,
              `| template specs | ${specs === 'failure' ? '❌ failed' : '✅ passed'} |`,
              '',
              `[View Playwright report](${runUrl}) (download artifact \`playwright-report-${context.runId}\`)`,
              '',
              '_Run `pnpm --filter @cambridge-tcg/admin test:e2e` locally to reproduce._',
            ].join('\n');

            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      - name: Fail if smoke failed
        if: steps.smoke.outcome == 'failure'
        run: |
          echo "Smoke spec failed — see Playwright report artifact"
          exit 1
