name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  # Cancel older runs of the same branch when a new push lands
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  detect:
    name: Detect changed apps
    runs-on: ubuntu-latest
    outputs:
      storefront: ${{ steps.filter.outputs.storefront }}
      wholesale:  ${{ steps.filter.outputs.wholesale }}
      rewardspro: ${{ steps.filter.outputs.rewardspro }}
      shared:     ${{ steps.filter.outputs.shared }}
      answering_rhymes: ${{ steps.filter.outputs.answering_rhymes }}
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 2 }
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            storefront:
              - 'apps/storefront/**'
            wholesale:
              - 'apps/wholesale/**'
            rewardspro:
              - 'apps/rewardspro/**'
            shared:
              - 'packages/**'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'package.json'
              - '.npmrc'
              - '.github/workflows/**'
            answering_rhymes:
              - 'packages/answering-rhymes/**'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'package.json'
              - '.npmrc'
              - '.github/workflows/**'

  install:
    name: Install + lint
    runs-on: ubuntu-latest
    needs: detect
    steps:
      - uses: actions/checkout@v4
      # No `version:` input — pnpm/action-setup honors the
      # `packageManager` pin in package.json (pnpm@9.15.0); passing a
      # second version here was the historical every-commit CI failure.
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Lint all workspaces
        # rewardspro excluded: its lint has been red since the standalone repo
        # (817 errors at fuse time, 2026-06-10) and was never a gate there.
        # Run `pnpm --filter rewardspro lint` locally; debt tracked in
        # apps/rewardspro/CLAUDE.md.
        run: pnpm --filter '!rewardspro' -r --if-present lint

  storefront:
    name: storefront (typecheck + test + build)
    runs-on: ubuntu-latest
    needs: [detect, install]
    if: needs.detect.outputs.storefront == 'true' || needs.detect.outputs.shared == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter cambridgetcg-storefront exec tsc --noEmit
      - run: pnpm --filter cambridgetcg-storefront test
      - run: pnpm --filter cambridgetcg-storefront build
        env:
          DATABASE_URL: postgres://x:x@localhost:5432/x
          NEXTAUTH_SECRET: ci-fake-secret-not-used
          NEXTAUTH_URL: http://localhost:3000

  answering_rhymes:
    name: answering-rhymes (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    needs: [detect, install]
    if: needs.detect.outputs.answering_rhymes == 'true'
    strategy:
      fail-fast: false
      matrix:
        node: ['20', '22', '24']
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @cambridge-tcg/answering-rhymes typecheck
      - run: pnpm --filter @cambridge-tcg/answering-rhymes test
      - if: matrix.node == '24'
        run: pnpm --filter @cambridge-tcg/answering-rhymes pack:check

  wholesale:
    name: wholesale (typecheck + test + build)
    runs-on: ubuntu-latest
    needs: [detect, install]
    if: needs.detect.outputs.wholesale == 'true' || needs.detect.outputs.shared == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter tcg-wholesale exec tsc --noEmit
      - run: pnpm --filter tcg-wholesale exec vitest run
      - run: pnpm --filter tcg-wholesale build
        env:
          DATABASE_URL: postgres://x:x@localhost:5432/x

  rewardspro:
    name: rewardspro (typecheck + unit tests + build)
    runs-on: ubuntu-latest
    needs: [detect, install]
    if: needs.detect.outputs.rewardspro == 'true' || needs.detect.outputs.shared == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      # prisma generate must precede tsc: on a fresh runner @prisma/client's
      # postinstall runs at the repo root (INIT_CWD), finds no schema there,
      # and leaves the typeless stub client — tsc then fails with TS2305 on
      # every model/enum import. generate never connects to a database.
      - run: pnpm --filter rewardspro exec prisma generate
      - run: pnpm --filter rewardspro exec tsc --noEmit
      - run: pnpm --filter rewardspro test:unit
      - run: pnpm --filter rewardspro build
        env:
          DATABASE_URL: postgresql://prisma:generate@localhost:5432/placeholder

  ci-status:
    name: CI status
    runs-on: ubuntu-latest
    if: always()
    needs: [install, answering_rhymes, storefront, wholesale, rewardspro]
    steps:
      - name: Fail if any required job failed
        # `install` always runs; the per-app jobs may be skipped if no relevant
        # files changed. A skipped job is fine — only failures block.
        run: |
          if [ "${{ needs.install.result }}" != "success" ]; then exit 1; fi
          for r in "${{ needs.answering_rhymes.result }}" "${{ needs.storefront.result }}" "${{ needs.wholesale.result }}" "${{ needs.rewardspro.result }}"; do
            if [ "$r" = "failure" ] || [ "$r" = "cancelled" ]; then exit 1; fi
          done
          echo "CI green"
